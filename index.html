/* ── SETUP SCREEN ── */

.setup-box { background: #fff; border-radius: 8px; box-shadow: 0 2px 10px rgba(0,0,0,.15); padding: 36px 40px; width: 480px; }
.setup-box h1 { font-size: 18px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 24px; height: 24px; background: #1a73e8; border-radius: 4px; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.setup-box p { font-size: 12px; color: #5f6368; margin-bottom: 24px; line-height: 1.6; }
.setup-box p a { color: #1a73e8; text-decoration: none; }
.form-row { margin-bottom: 16px; }
.form-row label { display: block; font-size: 11px; font-weight: 600; color: #5f6368; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
.form-row input { width: 100%; padding: 8px 10px; border: 1px solid #dadce0; border-radius: 4px; font-size: 13px; outline: none; }
.form-row input:focus { border-color: #1a73e8; }
.form-row .note { font-size: 11px; color: #80868b; margin-top: 4px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 18px; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: background .12s; }
.btn-primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
.btn-primary:hover { background: #1557b0; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-secondary { background: #fff; color: #3c4043; border-color: #dadce0; }
.btn-secondary:hover { background: #f1f3f4; }
.btn-danger { background: #fff; color: #c5221f; border-color: #f5c6c3; }
.btn-danger:hover { background: #fce8e6; }
.err { color: #c5221f; font-size: 12px; margin-top: 8px; min-height: 18px; }

/* ── MANAGER SCREEN ── */
#screen-mgr { background: #f1f3f4; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; overflow: hidden; }
.mgr-wrap { display: flex; flex-direction: column; height: 100%; min-height: 0; }
.mgr-header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 14px 24px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.mgr-header h2 { font-size: 16px; font-weight: 600; flex: 1; }
.mgr-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.mgr-footer { background: #fff; border-top: 1px solid #e0e0e0; padding: 12px 24px; display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }

.proj-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 12px; overflow: hidden; }
.proj-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #f8f9fa; border-bottom: 1px solid #e8eaed; }
.proj-head input[type=text] { flex: 1; border: none; background: transparent; font-size: 13px; font-weight: 600; outline: none; }
.proj-body { padding: 12px 14px; }

.acc-card { border: 1px solid #e8eaed; border-radius: 5px; padding: 12px; margin-bottom: 8px; background: #fafafa; }
.acc-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.acc-head input[type=text] { flex: 1; padding: 5px 8px; border: 1px solid #dadce0; border-radius: 4px; font-size: 13px; font-weight: 500; outline: none; }
.acc-head input[type=text]:focus { border-color: #1a73e8; }

.field-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 8px; }
.field-table th { background: #f3f3f3; padding: 4px 8px; text-align: left; border: 1px solid #e0e0e0; font-weight: 600; color: #5f6368; font-size: 11px; white-space: nowrap; }
.field-table td { padding: 4px 6px; border: 1px solid #e8eaed; vertical-align: middle; }
.field-table td:first-child { font-weight: 600; background: #f9f9f9; white-space: nowrap; width: 120px; }
.field-table select { width: 100%; padding: 3px 5px; border: 1px solid #dadce0; border-radius: 3px; font-size: 11.5px; outline: none; background: #fff; }
.field-table select:focus { border-color: #1a73e8; }
.field-table input[type=number] { width: 55px; padding: 3px 5px; border: 1px solid #dadce0; border-radius: 3px; font-size: 12px; outline: none; }
.calc-note { font-size: 11px; color: #1a73e8; background: #e8f0fe; padding: 5px 8px; border-radius: 3px; margin-top: 4px; }

/* ── DASHBOARD SCREEN ── */
#screen-dash { display:flex; flex-direction:column; flex:1; min-height:0; }
.topbar { height: 40px; background: #fff; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; padding: 0 12px; gap: 8px; flex-shrink: 0; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
.topbar-title { font-size: 14px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tbtn { padding: 5px 10px; background: #fff; border: 1px solid #dadce0; border-radius: 4px; font-size: 12px; color: #3c4043; cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; }
.tbtn:hover { background: #f1f3f4; }
.tbtn.blue { background: #1a73e8; color: #fff; border-color: #1a73e8; }
.tbtn.blue:hover { background: #1557b0; }

/* Project tabs */
.proj-bar { height: 40px; background: #fff; border-bottom: 2px solid #e0e0e0; display: flex; align-items: flex-end; padding: 0 8px 4px; overflow-x: scroll; flex-shrink: 0; }
.proj-bar::-webkit-scrollbar { height: 0; }
.ptab { height: 29px; padding: 0 14px; display: flex; align-items: center; font-size: 12px; color: #5f6368; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; margin-bottom: -2px; }
.ptab:hover { color: #202124; }
.ptab.on { color: #1a73e8; border-bottom-color: #1a73e8; font-weight: 600; }

/* Account tabs (Sheets style) */
.acc-bar { height: 40px; background: #f1f3f4; border-bottom: 1px solid #c7c7c7; display: flex; align-items: flex-end; padding: 0 6px 4px; gap: 2px; overflow-x: scroll; flex-shrink: 0; }
.acc-bar::-webkit-scrollbar { height: 0; }
.atab { height: 29px; padding: 0 13px; display: flex; align-items: center; gap: 6px; font-size: 12px; color: #444746; cursor: pointer; border: 1px solid transparent; border-bottom: none; border-radius: 3px 3px 0 0; position: relative; top: 1px; white-space: nowrap; }
.atab:hover { background: #e8eaed; border-color: #c7c7c7; }
.atab.on { background: #fff; border-color: #c7c7c7; border-bottom-color: #fff; font-weight: 600; color: #202124; }
.atab.drag-over { border: 2px dashed #1a73e8 !important; background: #e8f0fe; }
.ptab.drag-over { border: 2px dashed #1a73e8 !important; background: #e8f0fe; }
.ptab[draggable="true"] { cursor: grab; }
.ptab[draggable="true"]:active { cursor: grabbing; }
.atab[draggable="true"] { cursor: grab; }
.atab[draggable="true"]:active { cursor: grabbing; }
.atab .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Date filter */
.dbar { height: 33px; background: #fff; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; padding: 0 12px; gap: 6px; flex-shrink: 0; }
.dbar label { font-size: 11.5px; color: #5f6368; }
.dbar input[type=date] { padding: 2px 6px; border: 1px solid #dadce0; border-radius: 3px; font-size: 12px; height: 23px; outline: none; }
.dbar input[type=date]:focus { border-color: #1a73e8; }
.dbar .rowcount { margin-left: auto; font-size: 11px; color: #80868b; }

table { border-collapse: collapse; font-size: 12.5px; }
thead th { position: sticky; top: 0; z-index: 10; background: #f3f3f3; border-right: 1px solid #d0d0d0; border-bottom: 2px solid #aaa; padding: 4px 6px; text-align: center; font-size: 11px; font-weight: 600; color: #3c4043; white-space: nowrap; cursor: pointer; user-select: none; }
thead th:hover { background: #e8eaed; }
thead th.sorted { background: #e8f0fe; color: #1a73e8; }
thead th:first-child { position: sticky; left: 0; z-index: 11; text-align: left; border-right: 2px solid #999; padding-left: 8px; }
tbody tr:nth-child(odd) td { background: #fff; }
tbody tr:nth-child(even) td { background: #f9f9f9; }
tbody tr:hover td { background: #e8f0fe !important; }
tbody td { border-right: 1px solid #d0d0d0; border-bottom: 1px solid #d0d0d0; padding: 3px 6px; text-align: right; white-space: nowrap; }
tbody td:first-child { position: sticky; left: 0; z-index: 2; text-align: left; border-right: 2px solid #c4c7c5; padding-left: 8px; font-size: 12px; }
tbody tr:nth-child(odd) td:first-child { background: #fff; }
tbody tr:nth-child(even) td:first-child { background: #f9f9f9; }
tbody tr:hover td:first-child { background: #e8f0fe !important; }
tr.totrow td { background: #fff !important; font-weight: 700; border-top: 2px solid #555 !important; border-bottom: 2px solid #555 !important; }
tr.totrow td:first-child { background: #fff !important; }
td.memo-cell { text-align: left !important; padding: 2px 4px !important; width: 100%; min-width: 200px; }
td.memo-cell input { width: 100%; border: none; background: transparent; font-size: 12px; color: #3c4043; outline: none; padding: 1px 4px; border-radius: 3px; }
td.memo-cell input:hover { background: #f0f0f0; }
td.memo-cell input:focus { background: #fff; border: 1px solid #dadce0; }
.div0 { color: #c5221f; font-size: 11px; }
.dow { color: #5f6368; font-size: 11px; margin-left: 3px; }
.empty-msg { text-align: center; color: #80868b; padding: 48px 20px; font-size: 13px; }

/* Status bar */
.sbar { height: 21px; background: #f1f3f4; border-top: 1px solid #e0e0e0; display: flex; align-items: center; padding: 0 12px; gap: 16px; flex-shrink: 0; }
.sbar span { font-size: 11px; color: #5f6368; }
.sbar b { color: #202124; }

/* Loading spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid #e0e0e0; border-top-color: #1a73e8; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 5px; }


/* ── テーブルエリア ── */
.tscroll-wrap { flex:1; position:relative; overflow:hidden; min-height:0; }
.tscroll { position:absolute; inset:0 14px 14px 0; overflow:scroll; scrollbar-width:none; }
#scroll-x-track { position:absolute; bottom:0; left:0; right:14px; height:14px; background:#d0d0d0; cursor:pointer; user-select:none; touch-action:none; }
#scroll-x-thumb { position:absolute; top:2px; height:10px; background:#888; border-radius:5px; cursor:grab; min-width:30px; user-select:none; touch-action:none; }
#scroll-y-track { position:absolute; top:0; right:0; width:14px; bottom:14px; background:#d0d0d0; cursor:pointer; user-select:none; touch-action:none; }
#scroll-y-thumb { position:absolute; left:2px; width:10px; background:#888; border-radius:5px; cursor:grab; min-height:30px; user-select:none; touch-action:none; }
#scroll-corner { position:absolute; bottom:0; right:0; width:14px; height:14px; background:#b0b0b0; }

.tscroll::-webkit-scrollbar { display:none; }

.acc-bar::-webkit-scrollbar,
.proj-bar::-webkit-scrollbar { height:6px; -webkit-appearance:none; }
.acc-bar::-webkit-scrollbar-thumb,
.proj-bar::-webkit-scrollbar-thumb { background:#aaa; border-radius:3px; }
.acc-bar::-webkit-scrollbar-track,
.proj-bar::-webkit-scrollbar-track { background:#e0e0e0; }

/* ── アカウントフリーメモエリア ── */
#acc-note-wrap { flex-shrink:0; background:#fffde7; border-bottom:1px solid #f0e68c; overflow:hidden; transition:max-height 0.2s ease; }
#acc-note-wrap.collapsed { max-height:28px; }
#acc-note-wrap.expanded  { max-height:160px; }
#acc-note-toggle { width:100%; background:none; border:none; border-bottom:1px solid #f0e68c; padding:4px 12px; font-size:11px; color:#888; text-align:left; cursor:pointer; display:flex; align-items:center; gap:6px; }
#acc-note-toggle:hover { background:#fff9c4; }
#acc-note-area { width:100%; box-sizing:border-box; border:none; background:transparent; resize:none; font-size:13px; padding:6px 12px; outline:none; color:#333; font-family:inherit; height:120px; }
/* ── チャートエリア ── */
#chart-wrap { flex-shrink:0; background:#f8f9ff; border-bottom:1px solid #dde3f5; overflow:hidden; transition:max-height 0.3s ease; }
#chart-wrap.collapsed { max-height:28px; }
#chart-wrap.expanded  { max-height:380px; }
/* ── 予算ウィジェット ── */
#budget-wrap { flex-shrink:0; background:#f0f7ff; border-top:1px solid #c5ddf7; padding:8px 14px; display:none; }
#budget-wrap.visible { display:block; }
.budget-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.budget-label { font-size:11px; font-weight:600; color:#5f6368; white-space:nowrap; }
.budget-input-wrap { display:flex; align-items:center; gap:4px; }
.budget-input { width:120px; padding:3px 7px; border:1px solid #b0c4d8; border-radius:4px; font-size:13px; text-align:right; outline:none; background:#fff; }
.budget-input:focus { border-color:#1a73e8; }
.budget-stats { display:flex; gap:16px; flex-wrap:wrap; margin-top:5px; }
.budget-stat { background:#fff; border:1px solid #c5ddf7; border-radius:6px; padding:4px 12px; min-width:120px; text-align:center; }
.budget-stat .bs-label { font-size:10px; color:#5f6368; display:block; }
.budget-stat .bs-val { font-size:15px; font-weight:700; color:#1a73e8; display:block; }
.budget-stat .bs-val.warn { color:#e67e22; }
.budget-stat .bs-val.ok   { color:#27ae60; }
.budget-stat .bs-val.over { color:#e74c3c; }
#chart-toggle { width:100%; background:none; border:none; border-bottom:1px solid #dde3f5; padding:4px 12px; font-size:11px; color:#888; text-align:left; cursor:pointer; display:flex; align-items:center; gap:6px; }
#chart-toggle:hover { background:#eef1ff; }
#chart-inner { padding:8px 16px 12px; display:flex; flex-direction:column; gap:8px; }
#chart-metrics { display:flex; flex-wrap:wrap; gap:6px; }
.chart-metric-btn { padding:3px 10px; border-radius:12px; border:1.5px solid #bbb; background:#fff; font-size:11px; cursor:pointer; color:#555; transition:all 0.15s; }
.chart-metric-btn.active { color:#fff; border-color:transparent; }
#chart-canvas-wrap { position:relative; height:260px; }
#chart-canvas { width:100%; height:100%; }

<script>
// 日付maxを今日に設定（即時実行）
document.addEventListener('DOMContentLoaded', function() {
  var t = new Date();
  var s = t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0');
  var df = document.getElementById('d-from');
  var dt = document.getElementById('d-to');
  // 当月末日を計算（maxとして使用）
  var _eom = new Date(t.getFullYear(), t.getMonth()+1, 0);
  var _eoms = _eom.getFullYear()+'-'+String(_eom.getMonth()+1).padStart(2,'0')+'-'+String(_eom.getDate()).padStart(2,'0');
  if (df) { df.max = _eoms; }
  if (dt) { dt.max = _eoms; }
  // 両方ともlocalStorageから復元（記憶）、なければデフォルト値を設定
  var savedFrom = localStorage.getItem('df');
  var savedTo   = localStorage.getItem('dt');
  if (savedFrom && df) df.value = savedFrom;
  else if (df) df.value = s; // デフォルト：今日
  if (savedTo   && dt) dt.value = savedTo;
  else if (dt) dt.value = _eoms; // デフォルト：当月末日
});
</script>

/* ═══════════════════════════

const MEMO_KEY  = 'meta-ads-memo-v2';
// ★Google Apps Script デプロイURL（設定後に書き換え）
var GAS_URL_DEFAULT = 'https://script.google.com/macros/s/AKfycbymSfg2TyLAugd04yrMqdbkttEh5_GDmZDtBM-Ql7YywXIgR77DAAefckMkbTchRDLj/exec';

const DOW_JA    = ['日','月','火','水','木','金','土'];
const TAB_COLORS = ['#1a73e8','#188038','#e37400','#a142f4','#d93025','#0097a7','#c62828','#7b5ea7','#1e8e3e'];

/* ═══════════════════════════

/* ═══════════════════════════
   STORAGE
═══════════════════════════ */
// ── クラウド保存 (GAS) ──
async function gasFetch(method, body) {
  if (!GAS_URL) return null;
  try {
    var sep = GAS_URL.indexOf('?') >= 0 ? '&' : '?';
    var res;
    if (method === 'GET') {
      // GETはURLパラメータで送信
      var params = new URLSearchParams();
      Object.keys(body).forEach(function(k) {
        params.set(k, body[k]);
      });
      res = await fetch(GAS_URL + sep + params.toString());
    } else {
      // POSTはGETパラメータで送信（CORS回避）
      // データが大きい場合はbody=JSONエンコード方式で送信
      var postJson = JSON.stringify(body);
      var postParams;
      if (postJson.length > 2000) {
        // 大きいデータ：method=POST&body=エンコード
        postParams = 'method=POST&body=' + encodeURIComponent(postJson);
      } else {
        // 小さいデータ：各フィールドを個別パラメータ
        var pp = new URLSearchParams();
        Object.keys(body).forEach(function(k) {
          var v = body[k];
          pp.set(k, typeof v === 'object' ? JSON.stringify(v) : String(v));
        });
        postParams = pp.toString();
      }
      res = await fetch(GAS_URL + sep + postParams);
    }
    var j = await res.json();
    if (method === 'GET') return j.ok ? j.data : null;
    return j.ok;
  } catch(e) {
    console.warn('[GAS]', e.message);
    return null;
  }
}

async function cloudSaveCfg(cfgObj) {
  if (!GAS_URL) return;
  try {
    // text/plain POSTはCORSプリフライトなしで送信できる（動作確認済み）
    await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'saveConfig', data: cfgObj })
    });
  } catch(e) {
    // CORSエラーは無視（GAS側では保存済み）
  }
}

async function cloudLoadCfg() {
  return await gasFetch('GET', { action: 'getConfig' });
}

async function cloudLoadMemos() {
  return await gasFetch('GET', { action: 'getMemos' });
}

async function cloudSaveMemo(accId, date, text) {
  if (!GAS_URL) return;
  try {
    var sep = GAS_URL.indexOf('?') >= 0 ? '&' : '?';
    var action = text ? 'saveMemo' : 'deleteMemo';
    // encodeURIComponentで特殊文字（スペース、コロン等）を確実にエンコード
    var url = GAS_URL + sep
      + 'action=' + encodeURIComponent(action)
      + '&accId=' + encodeURIComponent(String(accId))
      + '&date=' + encodeURIComponent(String(date));
    if (text) url += '&text=' + encodeURIComponent(String(text));
    await fetch(url);
  } catch(e) { console.warn('[memo save]', e.message); }
}

async function cloudSaveAccNote(accId, text) {
  if (!GAS_URL) return;
  try {
    var sep = GAS_URL.indexOf('?') >= 0 ? '&' : '?';
    var action = text ? 'saveAccNote' : 'deleteAccNote';
    var url = GAS_URL + sep
      + 'action=' + encodeURIComponent(action)
      + '&accId=' + encodeURIComponent(String(accId));
    if (text) url += '&text=' + encodeURIComponent(String(text));
    await fetch(url);
  } catch(e) { console.warn('[accnote save]', e.message); }
}

async function cloudLoadAccNotes() {
  return await gasFetch('GET', { action: 'getAccNotes' });
}

function saveCfg() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(cfg)); } catch(e) {}
}
function loadCfg() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY) || 'null'); } catch(e) { return null; }
}
// メモを安全にマージ（どちらも消さない）
function safeMergeMemos(cloudMemos, localMemos) {
  var result = {};

  // キー正規化ヘルパー
  function normKey(k) {
    var sep = k.indexOf('::');
    if (sep < 0) return k;
    var acc = k.slice(0, sep), dt = k.slice(sep+2);
    return acc + '::' + normMemoDate(dt);
  }

  // まずlocalを正規化して入れる（ベースライン）
  if (localMemos && typeof localMemos === 'object') {
    Object.keys(localMemos).forEach(function(k) {
      if (!localMemos[k]) return;
      result[normKey(k)] = localMemos[k];
    });
  }
  // cloudを正規化して上書き（cloudにある = GASに保存済み = 信頼できるデータ）
  // cloudにないがlocalにあるものはそのまま保持
  if (cloudMemos && typeof cloudMemos === 'object') {
    Object.keys(cloudMemos).forEach(function(k) {
      if (!cloudMemos[k]) return;
      result[normKey(k)] = cloudMemos[k];
    });
  }
  return result;
}

// cloudにないメモをcloudへ同期
function syncMemosToCloud(allMemos, cloudMemos) {
  if (!GAS_URL) return;
  Object.keys(allMemos).forEach(function(k) {
    if (!allMemos[k]) return;
    if (!cloudMemos || !cloudMemos[k]) {
      var parts = k.split('::');
      if (parts.length >= 2) {
        var accId = parts[0], date = parts.slice(1).join('::');
        cloudSaveMemo(accId, date, allMemos[k]);
      }
    }
  });
}

function saveMemos() {
  try { localStorage.setItem(MEMO_KEY, JSON.stringify(memos)); } catch(e) {}
}
function loadMemos() {
  try { return JSON.parse(localStorage.getItem(MEMO_KEY) || '{}'); } catch(e) { return {}; }
}
const uid = () => Math.random().toString(36).slice(2, 9);

// メモキー用の日付正規化: どんな形式でも "yyyy-MM-dd" に統一（GASと合わせる）
function normMemoDate(dateStr) {
  if (!dateStr || dateStr === '__totrow__') return dateStr;
  var s = String(dateStr).trim();
  var m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) return m[1] + '-' + ('0'+m[2]).slice(-2) + '-' + ('0'+m[3]).slice(-2);
  return s;
}

// 既存のメモキーをyyyy-MM-dd形式に移行
function migrateMemoKeys() {
  try {
    var old = JSON.parse(localStorage.getItem(MEMO_KEY) || '{}');
    var migrated = {};
    var changed = false;
    Object.keys(old).forEach(function(k) {
      var sep = k.indexOf('::');
      if (sep < 0) { migrated[k] = old[k]; return; }
      var accId = k.slice(0, sep);
      var date = k.slice(sep + 2);
      var newDate = normMemoDate(date);
      var newKey = accId + '::' + newDate;
      if (newKey !== k) changed = true;
      // 新キーが既にある場合は既存を優先
      if (!migrated[newKey]) migrated[newKey] = old[k];
    });
    if (changed) {
      localStorage.setItem(MEMO_KEY, JSON.stringify(migrated));
      console.log('[memo] migrated keys');
    }
    return migrated;
  } catch(e) { return {}; }
}

/* ═══════════════════════════
   SCREEN SWITCHING
═══════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ═══════════════════════════
   API
═══════════════════════════ */
async function sheetsApi(path) {
  const sep = path.includes('?') ? '&' : '?';
  const url = 'https://sheets.googleapis.com/v4/spreadsheets/' + ssId + path + sep + 'key=' + apiKey;
  const res = await fetch(url);
  const json = await res.json();
  if (!res.ok) throw new Error(json.error ? json.error.message : 'HTTP ' + res.status);
  return json;
}

async function fetchPreview(sheet) {
  if (srcPrev[sheet]) return;
  try {
    // ヘッダー行を範囲指定なしで全列取得
    const hd = await sheetsApi('/values/' + encodeURIComponent(sheet) + '!1:6');
    srcPrev[sheet] = hd.values || [];
  } catch(e) { srcPrev[sheet] = []; }
}

async function fetchSheet(sheet) {
  if (rawCache[sheet]) return;
  try {
    const d = await sheetsApi('/values/' + encodeURIComponent(sheet));
    rawCache[sheet] = d.values || [];
  } catch(e) { rawCache[sheet] = []; }
}

/* ═══════════════════════════
   CONNECT (STEP 1)
═══════════════════════════ */

async function doConnect() {
  apiKey = document.getElementById('inp-key').value.trim();
  ssId   = (document.getElementById('inp-sid').value || '').trim();
  const errEl = document.getElementById('setup-err');
  errEl.textContent = '';

  const btn = document.getElementById('btn-connect');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>接続中…';

  try {
    // GAS URLがある場合はcfgを自動取得
    var cloudCfg = await cloudLoadCfg();
    var localCfg = loadCfg();

    // APIキー: 入力 → localのcfg の優先順（GASには保存しない）
    if (!apiKey && localCfg && localCfg.key) apiKey = localCfg.key;
    if (!apiKey) { errEl.textContent = 'APIキーを入力してください'; btn.disabled=false; btn.textContent='接続する →'; return; }

    // ssId: 入力 → GASのcfg → localのcfg の優先順
    if (!ssId && cloudCfg && cloudCfg.sid) ssId = cloudCfg.sid;
    if (!ssId && localCfg && localCfg.sid) ssId = localCfg.sid;
    if (!ssId) { errEl.textContent = 'スプレッドシートIDが取得できませんでした'; btn.disabled=false; btn.textContent='接続する →'; return; }

    // inp-sidに自動補完した値を反映
    var sidEl = document.getElementById('inp-sid');
    if (sidEl) sidEl.value = ssId;

    const meta = await sheetsApi('?fields=properties.title,sheets.properties(title)');
    document.getElementById('dash-title').textContent = 'Metaデイリーレポート';
    srcSheets = (meta.sheets || []).map(s => s.properties);
    for (const s of srcSheets) await fetchPreview(s.title);

    // GASのcfgを優先（ssId一致チェック不要）
    var saved = cloudCfg || localCfg;
    if (saved && saved.projects) {
      cfg = saved;
      cfg.key = apiKey;
      // クラウド設定をローカルにも同期
      saveCfg();
      // メモ: 両方マージして絶対に消さない
      var localMemos = loadMemos();
      var cloudMemos = await cloudLoadMemos();
      // cloudとlocalの両方を合わせる（どちらも消さない）
      memos = safeMergeMemos(cloudMemos, localMemos);
      saveMemos();
      // cloudにないメモをcloudへ同期
      syncMemosToCloud(memos, cloudMemos);
      // アカウントフリーメモをクラウドから取得（localStorageとマージ）
      var localAccNotes = {};
      Object.keys(localStorage).forEach(function(k) {
        if (k.indexOf('accnote::') === 0) {
          var aid = k.slice('accnote::'.length);
          localAccNotes[aid] = localStorage.getItem(k);
        }
      });
      var cloudAccNotes = await cloudLoadAccNotes();
      var cloudHasData = cloudAccNotes && Object.keys(cloudAccNotes).length > 0;
      if (cloudHasData) {
        // クラウド優先・localにしかないものもマージ
        accNotes = Object.assign({}, localAccNotes, cloudAccNotes);
        Object.keys(accNotes).forEach(function(aid) {
          localStorage.setItem('accnote::' + aid, accNotes[aid]);
        });
        // localにしかないaccnoteをクラウドへ移行保存
        Object.keys(localAccNotes).forEach(function(aid) {
          if (!cloudAccNotes[aid] && localAccNotes[aid]) {
            cloudSaveAccNote(aid, localAccNotes[aid]);
          }
        });
      } else {
        // クラウドが空 → localStorageから復元してクラウドへ移行保存
        accNotes = localAccNotes;
        if (GAS_URL && Object.keys(accNotes).length > 0) {
          Object.keys(accNotes).forEach(function(aid) {
            cloudSaveAccNote(aid, accNotes[aid]);
          });
        }
      }
      showScreen('screen-dash');
      buildProjTabs();
      if (cfg.projects.length > 0) selectProj(cfg.projects[0].id);
    } else {
      cfg = { key: apiKey, sid: ssId, projects: [] };
      buildMgr();
      showScreen('screen-mgr');
    }
  } catch(e) {
    errEl.textContent = 'エラー: ' + e.message;
  }
  btn.disabled = false;
  btn.textContent = '接続する →';
}

/* ═══════════════════════════
   MANAGER (STEP 2)
═══════════════════════════ */
function defaultFieldMap() {
  const sh = srcSheets.length > 0 ? srcSheets[0].title : '';
  const m = {};
  MAP_FIELDS.forEach(function(f, i) {
    m[f.k] = { sheet: sh, hrow: 1, col: i < 4 ? i : -1 };
    if (f.hasDateCol) m[f.k].dateCol = 0; // JOIN先の日付列（デフォルトA列）
  });
  return m;
}

function newProj() { return { id: uid(), name: '新規プロジェクト', accounts: [] }; }
function newAcc()  {
  return {
    id: uid(), name: '新規アカウント',
    color: TAB_COLORS[Math.floor(Math.random() * TAB_COLORS.length)],
    fieldMap: defaultFieldMap()
  };
}

function buildMgr() {
  const body = document.getElementById('mgr-body');
  body.innerHTML = '';

  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-secondary';
  addBtn.style.marginBottom = '14px';
  addBtn.textContent = '＋ プロジェクトを追加';
  addBtn.onclick = function() { cfg.projects.push(newProj()); buildMgr(); };
  body.appendChild(addBtn);

  if (cfg.projects.length === 0) cfg.projects.push(newProj());

  cfg.projects.forEach(function(proj, pi) {
    const card = document.createElement('div');
    card.className = 'proj-card';

    const head = document.createElement('div');
    head.className = 'proj-head';
    head.innerHTML =
      '<input type="text" value="' + esc(proj.name) + '" placeholder="プロジェクト名" ' +
        'oninput="cfg.projects[' + pi + '].name=this.value">' +
      '<button class="btn btn-secondary" style="font-size:11px;padding:3px 8px" ' +
        'onclick="cfg.projects[' + pi + '].accounts.push(newAcc());buildMgr()">＋ アカウント追加</button>' +
      '<button class="btn btn-danger" style="font-size:11px;padding:3px 8px" ' +
        'onclick="if(confirm(\'削除しますか？\')){cfg.projects.splice(' + pi + ',1);buildMgr();}">削除</button>';
    card.appendChild(head);

    const pbody = document.createElement('div');
    pbody.className = 'proj-body';

    if (proj.accounts.length === 0) {
      pbody.innerHTML = '<p style="color:#80868b;font-size:12px">「＋ アカウント追加」でアカウントを追加してください。</p>';
    } else {
      proj.accounts.forEach(function(acc, ai) {
        pbody.appendChild(buildAccCard(pi, acc, ai));
      });
    }
    card.appendChild(pbody);
    body.appendChild(card);
  });
}

function buildAccCard(pi, acc, ai) {
  const card = document.createElement('div');
  card.className = 'acc-card';
  card.id = 'acc-' + acc.id;

  // Header
  const head = document.createElement('div');
  head.className = 'acc-head';
  const colorInp = document.createElement('input');
  colorInp.type = 'color';
  colorInp.value = acc.color;
  colorInp.style.cssText = 'width:28px;height:28px;border:none;border-radius:4px;cursor:pointer;padding:0;flex-shrink:0';
  colorInp.oninput = function() { cfg.projects[pi].accounts[ai].color = this.value; };
  head.appendChild(colorInp);

  const nameInp = document.createElement('input');
  nameInp.type = 'text';
  nameInp.value = acc.name;
  nameInp.placeholder = 'アカウント名';
  nameInp.oninput = function() { cfg.projects[pi].accounts[ai].name = this.value; };
  head.appendChild(nameInp);

  const delBtn = document.createElement('button');
  delBtn.className = 'btn btn-danger';
  delBtn.style.cssText = 'font-size:11px;padding:3px 8px';
  delBtn.textContent = '削除';
  delBtn.onclick = function() {
    if (confirm('削除しますか？')) { cfg.projects[pi].accounts.splice(ai, 1); buildMgr(); }
  };
  head.appendChild(delBtn);
  card.appendChild(head);

  // Field mapping table
  const tbl = document.createElement('table');
  tbl.className = 'field-table';
  tbl.innerHTML =
    '<thead><tr>' +
    '<th>フィールド</th><th style="min-width:160px">シート</th>' +
    '<th style="width:70px">ヘッダー行</th><th style="min-width:180px">列</th>' +
    '<th style="min-width:150px">日付列(JOIN用)</th>' +
    '</tr></thead>';
  const tbody = document.createElement('tbody');

  MAP_FIELDS.forEach(function(f) {
    const fm = acc.fieldMap[f.k] || { sheet: srcSheets[0] ? srcSheets[0].title : '', hrow: 1, col: -1 };
    const tr = document.createElement('tr');

    // Field name cell
    const tdName = document.createElement('td');
    tdName.innerHTML = esc(f.label) + (f.req ? '<span style="color:#c5221f">*</span>' : '');
    tr.appendChild(tdName);

    // Sheet select
    const tdSheet = document.createElement('td');
    const selSheet = document.createElement('select');
    srcSheets.forEach(function(s) {
      const opt = document.createElement('option');
      opt.value = s.title;
      opt.textContent = s.title;
      if (s.title === fm.sheet) opt.selected = true;
      selSheet.appendChild(opt);
    });
    selSheet.onchange = function() {
      cfg.projects[pi].accounts[ai].fieldMap[f.k].sheet = this.value;
      cfg.projects[pi].accounts[ai].fieldMap[f.k].hrow = 1;
      rebuildAcc(pi, ai);
    };
    tdSheet.appendChild(selSheet);
    tr.appendChild(tdSheet);

    // Hrow input
    const tdHrow = document.createElement('td');
    const hrowInp = document.createElement('input');
    hrowInp.type = 'number';
    hrowInp.min = 1; hrowInp.max = 20;
    hrowInp.value = fm.hrow;
    hrowInp.onchange = function() {
      cfg.projects[pi].accounts[ai].fieldMap[f.k].hrow = parseInt(this.value, 10) || 1;
      rebuildAcc(pi, ai);
    };
    tdHrow.appendChild(hrowInp);
    tr.appendChild(tdHrow);

    // Column select
    const tdCol = document.createElement('td');
    const selCol = document.createElement('select');
    if (!f.req) {
      const noneOpt = document.createElement('option');
      noneOpt.value = '-1';
      noneOpt.textContent = '— なし —';
      selCol.appendChild(noneOpt);
    }
    const prev = srcPrev[fm.sheet] || [];
    const hdrRow = prev[fm.hrow - 1] || [];
    // rawCacheの実データからも最大列数を取得して確実に最終列まで表示
    const rawRows = rawCache[fm.sheet] || [];
    const maxFromRaw  = rawRows.reduce(function(m, r) { return Math.max(m, (r||[]).length); }, 0);
    const maxFromPrev = prev.reduce(function(m, r) { return Math.max(m, r.length); }, 0);
    const maxCols = Math.max(maxFromPrev, maxFromRaw, 30);
    for (let c = 0; c < maxCols; c++) {
      const opt = document.createElement('option');
      opt.value = String(c);
      opt.textContent = colAlpha(c) + (hdrRow[c] ? ' (' + hdrRow[c] + ')' : '');
      if (c === fm.col) opt.selected = true;
      selCol.appendChild(opt);
    }
    selCol.onchange = function() {
      cfg.projects[pi].accounts[ai].fieldMap[f.k].col = parseInt(this.value, 10);
    };
    tdCol.appendChild(selCol);
    tr.appendChild(tdCol);

    // JOIN用日付列（別シートのフィールドのみ）
    const tdDc = document.createElement('td');
    if (f.hasDateCol) {
      const selDc = document.createElement('select');
      selDc.style.cssText = 'width:100%;padding:3px 5px;border:1px solid #dadce0;border-radius:3px;font-size:11.5px;outline:none;background:#fff';
      const dcPrev = srcPrev[fm.sheet] || [];
      const dcHdr  = dcPrev[(fm.hrow||1)-1] || [];
      const dcMax  = Math.max(dcPrev.reduce(function(m,r){return Math.max(m,r.length);},0), 30);
      for (var dc = 0; dc < dcMax; dc++) {
        const dcOpt = document.createElement('option');
        dcOpt.value = String(dc);
        dcOpt.textContent = colAlpha(dc) + (dcHdr[dc] ? ' (' + dcHdr[dc] + ')' : '');
        if (dc === (fm.dateCol !== undefined ? fm.dateCol : 0)) dcOpt.selected = true;
        selDc.appendChild(dcOpt);
      }
      selDc.onchange = function() {
        cfg.projects[pi].accounts[ai].fieldMap[f.k].dateCol = parseInt(this.value, 10);
      };
      tdDc.appendChild(selDc);
    } else {
      tdDc.innerHTML = '<span style="color:#bbb;font-size:11px">—</span>';
    }
    tr.appendChild(tdDc);

    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  card.appendChild(tbl);

  const note = document.createElement('div');
  note.className = 'calc-note';
  note.textContent = 'CPM・CPA・CVR・MCPA・MCVR は自動計算（列指定不要）';
  card.appendChild(note);

  // Preview
  const sheetNames = [];
  MAP_FIELDS.forEach(function(f) {
    const sh = (acc.fieldMap[f.k] || {}).sheet;
    if (sh && sheetNames.indexOf(sh) < 0) sheetNames.push(sh);
  });
  sheetNames.forEach(function(sn) {
    const rows = srcPrev[sn] || [];
    if (!rows.length) return;
    const div = document.createElement('div');
    div.style.marginTop = '10px';
    const maxC = rows.reduce(function(m, r) { return Math.max(m, r.length); }, 0);
    let html = '<div style="font-size:11px;color:#80868b;margin-bottom:3px">📋 ' + esc(sn) + ' — 先頭行プレビュー</div>';
    html += '<div style="overflow:auto;max-height:100px;border:1px solid #e0e0e0;border-radius:3px">';
    html += '<table style="border-collapse:collapse;font-size:11px;font-family:monospace;width:100%">';
    html += '<thead><tr><th style="background:#f3f3f3;padding:2px 8px;border:1px solid #e0e0e0;position:sticky;top:0">#</th>';
    for (let c = 0; c < maxC; c++) html += '<th style="background:#f3f3f3;padding:2px 8px;border:1px solid #e0e0e0;position:sticky;top:0">' + colAlpha(c) + '</th>';
    html += '</tr></thead><tbody>';
    rows.slice(0, 5).forEach(function(row, ri) {
      html += '<tr><td style="background:#f3f3f3;padding:2px 8px;border:1px solid #eee;font-weight:600;color:#5f6368;text-align:center">' + (ri+1) + '</td>';
      for (let c = 0; c < maxC; c++) html += '<td style="padding:2px 8px;border:1px solid #eee;white-space:nowrap">' + esc(row[c] || '') + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    div.innerHTML = html;
    card.appendChild(div);
  });

  return card;
}

async function doSyncGas() {
  var btn = document.getElementById('btn-sync-gas');
  btn.disabled = true;
  btn.textContent = '⏳ 同期中...';
  try {
    var GAS = GAS_URL;
    // no-cors POST（レスポンスは読めないが送信は成功）
    await fetch(GAS, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: new URLSearchParams({action: 'saveConfig', data: JSON.stringify(cfg)}).toString()
    });
    // 3秒後にGETで確認
    await new Promise(r => setTimeout(r, 3000));
    var res = await fetch(GAS + '?action=getConfig').then(r => r.json());
    var ok = res.ok && res.data && res.data.sid === cfg.sid && 
             JSON.stringify(res.data.projects.map(p=>p.id).sort()) === JSON.stringify(cfg.projects.map(p=>p.id).sort());
    btn.disabled = false;
    btn.textContent = ok ? '✓ GAS同期完了' : '☁ 共有用にGASへ同期（第三者に最新設定を反映）';
    if (!ok) alert('GASへの同期に失敗しました。GASエディタでsaveConfigNow()を実行してください。');
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '☁ 共有用にGASへ同期（第三者に最新設定を反映）';
  }
}

function buildProjTabs() {
  const bar = document.getElementById('proj-bar');
  bar.innerHTML = '';
  // ── 総合タブを最左端に固定 ──
  if (cfg.projects.length > 1) {
    const gt = document.createElement('div');
    gt.className = 'ptab';
    gt.dataset.id = '__grand__';
    gt.textContent = '📊 総合';
    gt.onclick = function() { selectProj('__grand__'); };
    bar.appendChild(gt);
  }
  // ── 案件タブ（ドラッグ&ドロップで並び替え可）──
  cfg.projects.forEach(function(p) {
    const t = document.createElement('div');
    t.className = 'ptab';
    t.dataset.id = p.id;
    t.textContent = p.name;
    t.draggable = true;
    t.style.cursor = 'grab';
    t.onclick = function() { selectProj(p.id); };
    t.addEventListener('dragstart', function(e) {
      e.dataTransfer.setData('text/plain', p.id);
      t.classList.add('dragging');
      t.style.opacity = '0.5';
    });
    t.addEventListener('dragend', function() {
      t.classList.remove('dragging');
      t.style.opacity = '';
      document.querySelectorAll('.ptab').forEach(function(el) {
        el.classList.remove('drag-over');
      });
    });
    t.addEventListener('dragover', function(e) {
      e.preventDefault();
      const dragging = document.querySelector('.ptab.dragging');
      if (!dragging || dragging === t) return;
      t.classList.add('drag-over');
    });
    t.addEventListener('dragleave', function() {
      t.classList.remove('drag-over');
    });
    t.addEventListener('drop', function(e) {
      e.preventDefault();
      t.classList.remove('drag-over');
      const fromId = e.dataTransfer.getData('text/plain');
      if (!fromId || fromId === p.id) return;
      const fromIdx = cfg.projects.findIndex(function(x) { return x.id === fromId; });
      const toIdx   = cfg.projects.findIndex(function(x) { return x.id === p.id; });
      if (fromIdx < 0 || toIdx < 0) return;
      const moved = cfg.projects.splice(fromIdx, 1)[0];
      cfg.projects.splice(toIdx, 0, moved);
      saveCfg();
      cloudSaveCfg(cfg);
      buildProjTabs();
      // 現在選択中タブを維持
      document.querySelectorAll('.ptab').forEach(function(el) {
        el.classList.toggle('on', el.dataset.id === curProj);
      });
    });
    bar.appendChild(t);
  });
}

  });
}

async function loadAcc(id) {
  showLoading();
  try {
    // ── 総合タブ ──
    if (id === '__grand__') {
      // 全プロジェクトの全アカウントを読み込んでから合算
      var allAccIds = [];
      cfg.projects.forEach(function(p) { p.accounts.forEach(function(a) { allAccIds.push(a.id); }); });
      for (var i = 0; i < allAccIds.length; i++) {
        var aid = allAccIds[i];
        if (!mergedCache[aid]) {
          var acc2 = null;
          cfg.projects.forEach(function(p) { p.accounts.forEach(function(a) { if (a.id === aid) acc2 = a; }); });
          if (acc2) {
            var sheetsNeeded2 = [];
            MAP_FIELDS.forEach(function(f) { var sh = (acc2.fieldMap[f.k]||{}).sheet; if (sh && sheetsNeeded2.indexOf(sh)<0) sheetsNeeded2.push(sh); });
            for (var si = 0; si < sheetsNeeded2.length; si++) await fetchSheet(sheetsNeeded2[si]);
            mergedCache[aid] = buildRows(acc2);
          }
        }
      }
      mergedCache['__grand__'] = mergeByDate(allAccIds);
      initDateRange(mergedCache['__grand__']);
      renderTable();
      document.getElementById('sb-updated').textContent = new Date().toLocaleTimeString('ja-JP');
      return;
    }

    // ── プロジェクト合計タブ ──
    if (id.indexOf('__total__') === 0) {
      var pid = id.replace('__total__', '');
      var proj = cfg.projects.find(function(p) { return p.id === pid; });
      if (!proj) { showEmpty('プロジェクトが見つかりません'); return; }
      var accIds = proj.accounts.map(function(a) { return a.id; });
      for (var i = 0; i < accIds.length; i++) {
        var aid = accIds[i];
        if (!mergedCache[aid]) {
          var acc3 = proj.accounts.find(function(a) { return a.id === aid; });
          if (acc3) {
            var sheetsNeeded3 = [];
            MAP_FIELDS.forEach(function(f) { var sh = (acc3.fieldMap[f.k]||{}).sheet; if (sh && sheetsNeeded3.indexOf(sh)<0) sheetsNeeded3.push(sh); });
            for (var si = 0; si < sheetsNeeded3.length; si++) await fetchSheet(sheetsNeeded3[si]);
            mergedCache[aid] = buildRows(acc3);
          }
        }
      }
      mergedCache[id] = mergeByDate(accIds);
      initDateRange(mergedCache[id]);
      renderTable();
      document.getElementById('sb-updated').textContent = new Date().toLocaleTimeString('ja-JP');
      return;
    }

    // ── 通常アカウント ──
    if (!mergedCache[id]) {
      let acc = null;
      cfg.projects.forEach(function(p) {
        p.accounts.forEach(function(a) { if (a.id === id) acc = a; });
      });
      if (!acc) { showEmpty('アカウントが見つかりません'); return; }

      const sheetsNeeded = [];
      MAP_FIELDS.forEach(function(f) {
        const sh = (acc.fieldMap[f.k] || {}).sheet;
        if (sh && sheetsNeeded.indexOf(sh) < 0) sheetsNeeded.push(sh);
      });
      for (const sn of sheetsNeeded) await fetchSheet(sn);
      mergedCache[id] = buildRows(acc);
    }
    initDateRange(mergedCache[id]);
    renderTable();
    document.getElementById('sb-updated').textContent = new Date().toLocaleTimeString('ja-JP');
  } catch(e) {
    showEmpty('エラー: ' + e.message);
  }
}

// 複数アカウントの行を日付キーで合算する
function mergeByDate(accIds) {
  var dateMap = {}; // normDate → merged row
  accIds.forEach(function(aid) {
    var rows = mergedCache[aid] || [];
    rows.forEach(function(r) {
      if (r._tot) return;
      var dk = normDate(r.date) || r.date;
      if (!dateMap[dk]) {
        dateMap[dk] = {
          _tot: false, _d: r._d, date: r.date,
          spend: 0, clicks: 0, imp: 0, cv: 0, mcv: 0
        };
      }
      var m = dateMap[dk];
      m.spend  += isFinite(r.spend)  ? +r.spend  : 0;
      m.clicks += isFinite(r.clicks) ? +r.clicks : 0;
      m.imp    += isFinite(r.imp)    ? +r.imp    : 0;
      m.cv     += isFinite(r.cv)     ? +r.cv     : 0;
      m.mcv    += isFinite(r.mcv)    ? +r.mcv    : 0;
    });
  });
  // 派生指標を再計算
  return Object.keys(dateMap).sort().map(function(dk) {
    var m = dateMap[dk];
    m.cpm  = m.imp    > 0 ? m.spend / m.imp * 1000 : NaN;
    m.cpc  = m.clicks > 0 ? m.spend / m.clicks     : NaN;
    m.ctr  = m.imp    > 0 ? m.clicks / m.imp       : NaN;
    m.cpa  = m.cv     > 0 ? m.spend / m.cv         : NaN;
    m.cvr  = m.mcv    > 0 ? m.cv / m.mcv            : NaN;
    m.mcpa = m.mcv    > 0 ? m.spend / m.mcv        : NaN;
    m.mcvr = m.clicks > 0 ? m.mcv / m.clicks       : NaN;
    return m;
  });
}

/* ═══════════════════════════
   DATA PROCESSING
═══════════════════════════ */
// 日付文字列を YYYY-MM-DD に正規化（形式が違ってもJOINできるように）
function normDate(s) {
  if (!s) return '';
  s = s.trim();
  // 2026年1月1日火曜日 → 2026-01-01
  var m = s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (m) return m[1] + '-' + ('0'+m[2]).slice(-2) + '-' + ('0'+m[3]).slice(-2);
  // 2026/1/1 or 2026-1-1
  m = s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) return m[1] + '-' + ('0'+m[2]).slice(-2) + '-' + ('0'+m[3]).slice(-2);
  return s;
}

function buildRows(acc) {
  var fm = acc.fieldMap;
  var dateFm = fm['date'] || {};
  var baseSheet = dateFm.sheet || '';
  var baseDateCol = dateFm.col >= 0 ? dateFm.col : 0;
  var baseHrow = (dateFm.hrow || 1) - 1;
  var raw = rawCache[baseSheet] || [];

  // 別シートフィールドのJOINマップ: normDate(日付) → 値
  var joinMaps = {};
  ['spend','clicks','imp','cv','mcv'].forEach(function(fk) {
    var fmi = fm[fk] || {};
    if (!fmi.sheet || fmi.col < 0) return;
    if (fmi.sheet === baseSheet) return; // 同シートは直読み
    var jmap = {};
    var jraw = rawCache[fmi.sheet] || [];
    var jHrow = (fmi.hrow || 1) - 1;
    // JOIN先の日付列: fieldMapのdateCol設定を優先、なければ列0
    var jDateCol = (fmi.dateCol !== undefined && fmi.dateCol >= 0) ? fmi.dateCol : 0;
    for (var jri = jHrow + 1; jri < jraw.length; jri++) {
      var jrow = jraw[jri] || [];
      var dv = (jrow[jDateCol] || '').trim();
      var nd = normDate(dv);
      if (nd) jmap[nd] = jrow[fmi.col];
    }
    joinMaps[fk] = jmap;
  });

  // DEBUG: joinMapsの内容を確認
  Object.keys(joinMaps).forEach(function(fk) {
    var keys = Object.keys(joinMaps[fk]);
    var fmi2 = fm[fk] || {};
    console.log('[JOIN] ' + fk + ': ' + keys.length + '件, dateCol=' + fmi2.dateCol + ', 先頭キー=' + (keys[0]||'なし') + ', 値=' + joinMaps[fk][keys[0]]);
  });
  console.log('[rawCache] sheets:', Object.keys(rawCache).join(' | '));

  // baseSheetの行をマップ化（normDate → row）
  var baseRowMap = {};
  for (var ri2 = baseHrow + 1; ri2 < raw.length; ri2++) {
    var r2 = raw[ri2] || [];
    var ds2 = (r2[baseDateCol] || '').trim();
    if (!ds2) continue;
    var nd2 = normDate(ds2);
    if (nd2) baseRowMap[nd2] = { row: r2, dateStr: ds2 };
  }

  // joinMapsの日付もすべて収集（spend=0やbaseSheetにない日も含める）
  var allDateNorms = {};
  Object.keys(baseRowMap).forEach(function(nd) { allDateNorms[nd] = true; });
  ['cv','mcv','spend','clicks','imp'].forEach(function(fk) {
    if (joinMaps[fk]) Object.keys(joinMaps[fk]).forEach(function(nd) { allDateNorms[nd] = true; });
  });

  function readField(fk, currentRow, nd) {
    var fmi = fm[fk] || {};
    if (!fmi.sheet || fmi.col < 0) return NaN;
    if (fmi.sheet === baseSheet) return currentRow ? toNum(currentRow[fmi.col]) : NaN;
    var jmap = joinMaps[fk];
    return jmap ? toNum(jmap[nd]) : NaN;
  }

  var rows = [];
  Object.keys(allDateNorms).sort().forEach(function(dateNorm) {
    var baseEntry = baseRowMap[dateNorm];
    var row = baseEntry ? baseEntry.row : [];
    var dateStr = baseEntry ? baseEntry.dateStr : dateNorm.replace(/-/g, '/').replace(/\/0/g, '/').replace(/^(\d{4})\/(\d{2})\/(\d{2})$/, function(_, y, m, d) { return y + '/' + parseInt(m) + '/' + parseInt(d); });
    var isTot = /^total$/i.test(dateStr) || /^合計$/.test(dateStr);

    var spend  = readField('spend',  row, dateNorm);
    var clicks = readField('clicks', row, dateNorm);
    var imp    = readField('imp',    row, dateNorm);
    var cv     = readField('cv',     row, dateNorm);
    var mcv    = readField('mcv',    row, dateNorm);
    rows.push({
      _tot:   isTot,
      _d:     parseDate(dateStr),
      date:   dateStr,
      spend:  spend,
      clicks: clicks,
      imp:    imp,
      cv:     cv,
      mcv:    mcv,
      cpm:  (imp    > 0) ? spend / imp * 1000 : NaN,
      cpc:  (clicks > 0) ? spend / clicks     : NaN,
      ctr:  (imp    > 0) ? clicks / imp       : NaN,
      cpa:  (cv     > 0) ? spend / cv         : NaN,
      cvr:  (mcv    > 0) ? cv / mcv            : NaN,
      mcpa: (mcv    > 0) ? spend / mcv        : NaN,
      mcvr: (clicks > 0) ? mcv / clicks       : NaN,
    });
  });
  return rows;
}

/* ═══════════════════════════
   RENDER
═══════════════════════════ */
function renderTable() {
  // 日付inputのmax値を今日に設定し、超過valueはリセット
  var _today = new Date().toLocaleDateString('sv-SE');
  var _dTo = document.getElementById('d-to');
  var _dFrom = document.getElementById('d-from');
  var _eomC = new Date(); _eomC = new Date(_eomC.getFullYear(), _eomC.getMonth()+1, 0);
  var _eomCS = _eomC.getFullYear()+'-'+String(_eomC.getMonth()+1).padStart(2,'0')+'-'+String(_eomC.getDate()).padStart(2,'0');
  if (_dTo) { _dTo.max = _eomCS; }
  if (_dFrom) { _dFrom.max = _eomCS; }
  const rows = mergedCache[curAcc];
  if (!rows) return;
  // 合計・総合タブはメモ列を非表示
  var isTotalTab = (curAcc === '__grand__' || curAcc.indexOf('__total__') === 0);

  const fromStr = document.getElementById('d-from').value;
  const toStr   = document.getElementById('d-to').value;
  const from = fromStr ? parseLocalDate(fromStr, false) : null;
  const to   = toStr   ? parseLocalDate(toStr, true)    : null;

  // 当月末日まで表示（未来行は空白で表示）
  var _today = new Date(); _today.setHours(0,0,0,0);
  let data = rows.filter(function(r) {
    if (r._tot) return false;
    if (from && r._d && r._d < from) return false;
    if (to   && r._d && r._d > to)   return false;
    return true;
  });

  // d-toまでの日付で存在しない未来行を補完（空行として追加）
  if (to) {
    var existingDates = {};
    data.forEach(function(r){ if(r._d) existingDates[r._d.getTime()] = true; });
    var padStart = new Date(_today);
    var padEnd = to;
    for (var pd = new Date(padStart); pd <= padEnd; pd.setDate(pd.getDate()+1)) {
      var pdT = pd.getTime();
      if (!existingDates[pdT]) {
        var pdCopy = new Date(pdT);
        var pdStr = pdCopy.getFullYear() + '/' + (pdCopy.getMonth()+1) + '/' + pdCopy.getDate();
        data.push({ _tot:false, _d:pdCopy, date:pdStr, spend:NaN, clicks:NaN, imp:NaN, cv:NaN, mcv:NaN, cpm:NaN, cpc:NaN, ctr:NaN, cpa:NaN, cvr:NaN, mcpa:NaN, mcvr:NaN });
      }
    }
  }

  if (sortCol) {
    data = data.slice().sort(function(a, b) {
      const av = sortCol === '_d' ? (a._d ? a._d.getTime() : 0) : a[sortCol];
      const bv = sortCol === '_d' ? (b._d ? b._d.getTime() : 0) : b[sortCol];
      const ai = !isFinite(av), bi = !isFinite(bv);
      if (ai && bi) return 0;
      if (ai) return 1;
      if (bi) return -1;
      return sortDir * (av < bv ? -1 : av > bv ? 1 : 0);
    });
  }

  const tscroll = document.getElementById('tscroll');
  const tbl = document.createElement('table');
  tbl.style.tableLayout = 'auto';
  if (isTotalTab) {
    tbl.style.width = 'auto';
    tbl.style.marginLeft = '0';
  } else {
    var totalW = COLS.reduce(function(s, col) { return s + (col.w || 80); }, 0) + 40;
    tbl.style.minWidth = totalW + 'px';
    tbl.style.width = totalW + 'px';
    // tscroll-wrapの最大幅をテーブル幅+スクロールバー幅に制限
    // → 必ずスクロールが発生するようにする
    // tscrollにmin-widthを設定してスクロールバーを強制表示
    var ts = document.getElementById('tscroll');
    if (ts) {
      ts.style.overflowX = 'scroll';
      ts.style.overflowY = 'auto';
    }
  }

  // THEAD
  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  COLS.forEach(function(col) {
    const th = document.createElement('th');
    if (isTotalTab) {
      th.style.padding = '3px 5px';
      th.style.fontSize = '10.5px';
      th.style.minWidth = (col.k === 'date' ? 90 : Math.round((col.w||50)*0.85)) + 'px';
    } else {
      if (col.flex) { th.style.width = '100%'; }
      else if (col.w) { th.style.minWidth = col.w + 'px'; th.style.maxWidth = col.w + 'px'; }
    }
    if (col.k === 'date') th.style.textAlign = 'left';
    if (col.k === 'memo') th.style.textAlign = 'left';
    th.textContent = col.label;
    if (col.sortable) {
      if (sortCol === col.k || (col.k === 'date' && sortCol === '_d')) {
        th.classList.add('sorted');
        th.textContent += sortDir > 0 ? ' ▲' : ' ▼';
      }
      th.onclick = function() {
        const sk = col.k === 'date' ? '_d' : col.k;
        if (sortCol === sk) sortDir *= -1;
        else { sortCol = sk; sortDir = 1; }
        renderTable();
      };
    }
    hr.appendChild(th);
  });
  thead.appendChild(hr);
  tbl.appendChild(thead);

  // TBODY
  const tbody = document.createElement('tbody');
  if (data.length === 0) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = isTotalTab ? COLS.length - 1 : COLS.length;
    td.className = 'empty-msg';
    td.textContent = 'データがありません';
    tr.appendChild(td);
    tbody.appendChild(tr);
  } else {
    data.forEach(function(r, ri) {
      const tr = document.createElement('tr');
      COLS.forEach(function(col) {
        const td = document.createElement('td');
        if (col.k === 'date') {
          // 日付表示を YYYY/MM/DD に統一
          var dispDate = r.date;
          if (r._d) {
            dispDate = r._d.getFullYear() + '/'
              + String(r._d.getMonth()+1).padStart(2,'0') + '/'
              + String(r._d.getDate()).padStart(2,'0');
          }
          td.textContent = dispDate;
          if (r._d) {
            const sp = document.createElement('span');
            sp.className = 'dow';
            sp.textContent = '(' + DOW_JA[r._d.getDay()] + ')';
            td.appendChild(sp);
          }
        } else if (col.k === 'memo') {
          td.className = 'memo-cell';
          td.style.width = '100%';
          const inp = document.createElement('input');
          inp.type = 'text';
          inp.placeholder = 'メモ…';
          const mk = (isTotalTab ? '__total__' : curAcc) + '::' + normMemoDate(r.date);
          inp.value = memos[mk] || '';
          inp.addEventListener('change', (function(dateStr) {
            return function() {
              const mk2 = (isTotalTab ? '__total__' : curAcc) + '::' + normMemoDate(dateStr);
              if (this.value) memos[mk2] = this.value;
              else delete memos[mk2];
              saveMemos();
              cloudSaveMemo(isTotalTab ? '__total__' : curAcc, normMemoDate(dateStr), this.value); // クラウドにも保存
            };
          })(r.date));
          td.appendChild(inp);
        } else {
          // 未来日（今日以降）は数値セルを空白に
          var isFutureRow = r._d && r._d >= _today;
          if (isFutureRow) {
            td.textContent = '';
            td.style.color = '#ccc';
          } else {
            td.innerHTML = formatVal(col.fmt, r[col.k]);
          }
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    // TOTAL row（過去データのみ集計）
    lastRenderData = data;  // ウィジェット用に保存
    const tot = calcTotal(data.filter(function(r){ return !r._d || r._d < _today; }));
    const tr = document.createElement('tr');
    tr.className = 'totrow';
    COLS.forEach(function(col) {
      const td = document.createElement('td');
      if (isTotalTab) { td.style.padding = '2px 5px'; td.style.fontSize = '11.5px'; }
      if (col.k === 'date') {
        td.textContent = 'TOTAL';
        td.style.textAlign = 'left';
      } else if (col.k === 'memo') {
        td.className = 'memo-cell';
        const totInp = document.createElement('input');
        totInp.type = 'text';
        totInp.className = 'memo-inp';
        totInp.placeholder = 'メモ…';
        const totMk = (isTotalTab ? '__total__' : curAcc) + '::__totrow__';
        totInp.value = memos[totMk] || '';
        totInp.addEventListener('change', function() {
          if (this.value) memos[totMk] = this.value;
          else delete memos[totMk];
          saveMemos();
          cloudSaveMemo(isTotalTab ? '__total__' : curAcc, '__totrow__', this.value);
        });
        td.appendChild(totInp);
      } else {
        td.innerHTML = formatVal(col.fmt, tot[col.k]);
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);
  tscroll.innerHTML = '';
  tscroll.appendChild(tbl);
  if (!window._scrollbarReady) initCustomScroll();
  if (window._updateScrollThumbs) setTimeout(window._updateScrollThumbs, 50);
  // 横スクロール強制: 全子要素にmin-widthを付与
  var minW = COLS.reduce(function(s,col){ return s+(col.w||80); }, 0) + 160;
  var mwPx = minW + 'px';
  tbl.style.width = mwPx;
  tbl.style.minWidth = mwPx;
  // tscrollは自動伸縮するのでtableのmin-widthだけ設定

  // Status
  document.getElementById('rowcount').textContent = data.length + ' 行';
  document.getElementById('sb-rows').textContent  = data.length;
  const dates = data.map(function(r) { return r._d; }).filter(Boolean).sort(function(a,b){return a-b;});
  if (dates.length) {
    const fmt = function(d) { return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate(); };
    document.getElementById('sb-range').textContent = fmt(dates[0]) + ' 〜 ' + fmt(dates[dates.length-1]);
  }
  renderBudget();
}

/* ═══════════════════════════
   BUDGET WIDGET
═══════════════════════════ */
function getBudgetKey() {
  return 'budget::' + curAcc;
}
function onBudgetBlur(val) {
  var n = parseInt(val.replace(/[^0-9]/g, ''), 10);
  var input = document.getElementById('budget-input');
  if (isNaN(n) || n <= 0) {
    localStorage.removeItem(getBudgetKey());
    if (input) input.value = '';
  } else {
    localStorage.setItem(getBudgetKey(), n);
    if (input) input.value = n.toLocaleString('ja-JP');
  }
  renderBudget();
}
function renderBudget() {
  var wrap = document.getElementById('budget-wrap');
  var stats = document.getElementById('budget-stats');
  var input = document.getElementById('budget-input');
  if (!wrap || !stats) return;
  var isGrandOrTotal = (curAcc === '__grand__' || (curAcc && curAcc.indexOf('__total__') === 0));
  if (!isGrandOrTotal) { wrap.classList.remove('visible'); return; }
  wrap.classList.add('visible');
  var saved = parseInt(localStorage.getItem(getBudgetKey()), 10);
  if (input && document.activeElement !== input) {
    input.value = (!isNaN(saved) && saved > 0) ? saved.toLocaleString('ja-JP') : '';
  }
  // TOTAL行と完全に同じ_todayを生成（renderTable line 1314と同じ）
  var now = new Date(); now.setHours(0,0,0,0);

  // 期間フィルタ（d-from / d-to）を取得
  var dfEl = document.getElementById('d-from');
  var dtEl = document.getElementById('d-to');
  var periodStart = dfEl && dfEl.value ? new Date(dfEl.value) : null;
  var periodEnd   = dtEl && dtEl.value ? new Date(dtEl.value) : null;

  // フィルタがなければ当月全体をデフォルトに
  if (!periodStart) { periodStart = new Date(now.getFullYear(), now.getMonth(), 1); }
  if (!periodEnd)   { periodEnd   = new Date(now.getFullYear(), now.getMonth() + 1, 0); }

  // 期間の総日数・残日数（今日以降〜期間終了日）
  var totalDays  = Math.round((periodEnd - periodStart) / 86400000) + 1;
  var remainDays = now <= periodEnd ? Math.round((periodEnd - now) / 86400000) + 1 : 0;
  // 経過日数（期間開始〜昨日まで）
  var elapsedEnd  = now > periodEnd ? periodEnd : now;
  var elapsedDays = periodStart <= elapsedEnd
    ? Math.round((elapsedEnd - periodStart) / 86400000) + 1 : 0;

  // TOTAL行と完全同一の集計（lastRenderData = renderTable内フィルタ済みデータ）
  var totRows = lastRenderData.filter(function(r) { return !r._d || r._d < now; });
  var spentTotal = totRows.reduce(function(s, r) { return s + (isFinite(r.spend) ? +r.spend : 0); }, 0);

  var budget = (!isNaN(saved) && saved > 0) ? saved : null;
  var periodLabel = dfEl && dfEl.value ? (dfEl.value.replace(/-/g,'/') + '〜' + (dtEl.value||'').replace(/-/g,'/')) : '当月';
  var html = '';

  // 残日数（期間終了日まで）
  html += '<div class="budget-stat"><span class="bs-label">残日数（' + periodEnd.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}) + 'まで）</span><span class="bs-val">' + remainDays + ' 日</span></div>';

  // 期間消化金額
  html += '<div class="budget-stat"><span class="bs-label">期間消化金額</span><span class="bs-val" style="color:#555">' + Math.round(spentTotal).toLocaleString('ja-JP') + ' 円</span></div>';

  if (budget) {
    // 達成率
    var rate = spentTotal / budget * 100;
    var rateClass = rate >= 100 ? 'over' : rate >= 80 ? 'ok' : rate >= 50 ? 'warn' : '';
    html += '<div class="budget-stat"><span class="bs-label">達成率</span><span class="bs-val ' + rateClass + '">' + rate.toFixed(1) + '%</span></div>';

    // 残予算
    var remaining = budget - spentTotal;
    html += '<div class="budget-stat"><span class="bs-label">残予算</span><span class="bs-val" style="color:' + (remaining < 0 ? '#e74c3c' : '#555') + '">' + Math.round(remaining).toLocaleString('ja-JP') + ' 円</span></div>';

    // 残日あたり目標消化額
    if (remainDays > 0) {
      var dailyNeeded = remaining > 0 ? remaining / remainDays : 0;
      html += '<div class="budget-stat"><span class="bs-label">残日あたり目標</span><span class="bs-val">' + Math.round(dailyNeeded).toLocaleString('ja-JP') + ' 円/日</span></div>';
    }

    // 実績ペース（経過日数の平均）
    if (elapsedDays > 0 && spentTotal > 0) {
      var dailyActual = spentTotal / elapsedDays;
      var projected = dailyActual * totalDays;
      var projClass = projected >= budget ? 'ok' : 'warn';
      html += '<div class="budget-stat"><span class="bs-label">実績ペース（1日平均）</span><span class="bs-val ' + projClass + '">' + Math.round(dailyActual).toLocaleString('ja-JP') + ' 円/日</span></div>';
    }
  }
  stats.innerHTML = html;
}

function calcTotal(rows) {
  const sum = function(k) { return rows.reduce(function(t,r) { return t + (isFinite(r[k]) ? +r[k] : 0); }, 0); };
  const spend = sum('spend'), clicks = sum('clicks'), imp = sum('imp'), cv = sum('cv'), mcv = sum('mcv');
  return {
    spend, clicks, imp, cv, mcv,
    cpm:  imp    > 0 ? spend / imp * 1000 : NaN,
    cpc:  clicks > 0 ? spend / clicks     : NaN,
    ctr:  imp    > 0 ? clicks / imp       : NaN,
    cpa:  cv     > 0 ? spend / cv         : NaN,
    cvr:  mcv    > 0 ? cv / mcv            : NaN,
    mcpa: mcv    > 0 ? spend / mcv        : NaN,
    mcvr: clicks > 0 ? mcv / clicks       : NaN,
  };
}

/* ═══════════════════════════
   FORMATTERS
═══════════════════════════ */
function formatVal(fmt, v) {
  if (fmt === 'date' || fmt === 'memo') return esc(v || '');
  if (!isFinite(+v)) return '<span class="div0">#DIV/0!</span>';
  if (fmt === 'int')  return Math.round(+v).toLocaleString('ja-JP');
  if (fmt === 'dec1') return (+v).toFixed(1);
  if (fmt === 'pct') {
    const n = +v;
    return (n < 1 ? n * 100 : n).toFixed(2) + '%';
  }
  if (fmt === 'pct0') {
    const n = +v;
    return Math.round(n < 1 ? n * 100 : n) + '%';
  }
  if (fmt === 'pct2') {
    const n = +v;
    return (n < 1 ? n * 100 : n).toFixed(2) + '%';
  }
  return esc(String(v));
}

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function toNum(v) {
  if (v === null || v === undefined || v === '') return NaN;
  return parseFloat(String(v).replace(/[¥, %\s]/g, ''));
}

function parseDate(s) {
  if (!s) return null;
  let m = s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  return null;
}

function colAlpha(n) {
  let s = '', i = n + 1;
  while (i > 0) { s = String.fromCharCode(64 + (i % 26 || 26)) + s; i = Math.floor((i-1) / 26); }
  return s;
}

/* ═══════════════════════════
   DATES / MISC
═══════════════════════════ */
function parseLocalDate(str, endOfDay) {
  // Parse date string as LOCAL time (avoids UTC midnight timezone bug)
  var m = str.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return null;
  if (endOfDay) return new Date(+m[1], +m[2]-1, +m[3], 23, 59, 59);
  return new Date(+m[1], +m[2]-1, +m[3], 0, 0, 0);
}

function toISO(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function initDateRange(rows) {
  const valid = rows.filter(function(r) { return !r._tot && r._d; }).map(function(r) { return r._d; }).sort(function(a,b){return a-b;});
  if (!valid.length) return;
  const ef = document.getElementById('d-from'), et = document.getElementById('d-to');
  if (!ef.value) ef.value = toISO(valid[0]);
  if (!et.value) et.value = toISO(valid[valid.length-1]);
}

function clearDates() {
  localStorage.removeItem('df'); localStorage.removeItem('dt');
  document.getElementById('d-from').value = '';
  document.getElementById('d-to').value   = '';
  renderTable();
}

function showLoading() {
  document.getElementById('tscroll').innerHTML =
    '<div class="empty-msg"><span class="spinner"></span>読み込み中…</div>';
}

function showEmpty(msg) {
  document.getElementById('tscroll').innerHTML =
    '<div class="empty-msg">' + esc(msg) + '</div>';
}

async function doRefresh() {
  if (!curAcc) return;
  // キャッシュ全クリア（合計・総合タブも含む）
  rawCache = {};
  mergedCache = {};
  await loadAcc(curAcc);
}

function doCSV() {
  const rows = mergedCache[curAcc];
  if (!rows) return;
  const fromStr = document.getElementById('d-from').value;
  const toStr   = document.getElementById('d-to').value;
  const from = fromStr ? new Date(fromStr) : null;
  const to   = toStr   ? new Date(toStr + 'T23:59:59') : null;
  const data = rows.filter(function(r) {
    if (r._tot) return false;
    if (from && r._d && r._d < from) return false;
    if (to   && r._d && r._d > to)   return false;
    return true;
  });

  const hdrs = COLS.map(function(c) { return c.label; });
  const lines = [hdrs.join(',')];
  data.forEach(function(r) {
    lines.push(COLS.map(function(col) {
      if (col.k === 'date') {
        var csvDate = r._d
          ? (r._d.getFullYear() + '/' + String(r._d.getMonth()+1).padStart(2,'0') + '/' + String(r._d.getDate()).padStart(2,'0'))
          : (r.date || '');
        return '"' + csvDate.replace(/"/g, '""') + '"';
      }
      if (col.k === 'memo') {
        const mk = curAcc + '::' + r.date;
        return '"' + (memos[mk] || '').replace(/"/g, '""') + '"';
      }
      return isFinite(+r[col.k]) ? +r[col.k] : '#DIV/0!';
    }).join(','));
  });
  const tot = calcTotal(data);
  lines.push(COLS.map(function(col) {
    if (col.k === 'date') return 'TOTAL';
    if (col.k === 'memo') return '';
    return isFinite(tot[col.k]) ? tot[col.k] : '#DIV/0!';
  }).join(','));

  const blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'meta-daily-report-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

    if (keyEl) keyEl.value = saved.key || '';
    var sidEl = document.getElementById('inp-sid');
    if (sidEl) sidEl.value = saved.sid || '1CD1qBCGTtT7_eQlqdJm7Ra1s1cRI8D6KUWtQand6b3s';
  }
  // GAS URLが常にあるので自動接続（初回アクセスの第三者も含む）
  doConnectShared();
  return;
  // Enter key on inputs
  var keyEl2 = document.getElementById('inp-key');
  var sidEl2 = document.getElementById('inp-sid');
  if (keyEl2) keyEl2.addEventListener('keydown', function(e) { if (e.key === 'Enter') doConnect(); });
  if (sidEl2) sidEl2.addEventListener('keydown', function(e) { if (e.key === 'Enter') doConnect(); });
  // 日付入力の最大値を今日に設定
  var todayStr = new Date().toLocaleDateString('sv-SE');
  var dTo = document.getElementById('d-to');
  var dFrom = document.getElementById('d-from');
  var _eomT = new Date(); _eomT = new Date(_eomT.getFullYear(), _eomT.getMonth()+1, 0);
  var _eomTS = _eomT.getFullYear()+'-'+String(_eomT.getMonth()+1).padStart(2,'0')+'-'+String(_eomT.getDate()).padStart(2,'0');
  if (dTo) dTo.max = _eomTS;
  if (dFrom) dFrom.max = _eomTS;
  // カスタムスクロールバー初期化
  initCustomScroll();
});

function initCustomScroll() {
  var ts     = document.getElementById('tscroll');
  var xTrack = document.getElementById('scroll-x-track');
  var xThumb = document.getElementById('scroll-x-thumb');
  var yTrack = document.getElementById('scroll-y-track');
  var yThumb = document.getElementById('scroll-y-thumb');
  if (!ts || !xTrack || !xThumb || !yTrack || !yThumb) return;

  // 既存リスナーを除去するためcloneNodeで置き換え
  function cloneEl(el) {
    var n = el.cloneNode(true);
    el.parentNode.replaceChild(n, el);
    return n;
  }
  xThumb = cloneEl(xThumb);
  yThumb = cloneEl(yThumb);
  xTrack = document.getElementById('scroll-x-track');
  yTrack = document.getElementById('scroll-y-track');

  function updateThumbs() {
    var cw = ts.clientWidth,  sw = Math.max(ts.scrollWidth,  cw + 1);
    var ch = ts.clientHeight, sh = Math.max(ts.scrollHeight, ch + 1);
    var tw = xTrack.clientWidth, th = yTrack.clientHeight;
    var xW = Math.max(30, tw * cw / sw);
    xThumb.style.width  = xW + 'px';
    xThumb.style.left   = ((ts.scrollLeft / (sw - cw || 1)) * (tw - xW)) + 'px';
    var yH = Math.max(30, th * ch / sh);
    yThumb.style.height = yH + 'px';
    yThumb.style.top    = ((ts.scrollTop  / (sh - ch || 1)) * (th - yH)) + 'px';
  }

  var drag = null;

  function onMove(e) {
    if (!drag) return;
    if (drag.axis === 'x') {
      var xW = parseFloat(xThumb.style.width) || 30;
      ts.scrollLeft = drag.startScroll + (e.clientX - drag.startPos) *
        (ts.scrollWidth - ts.clientWidth) / (xTrack.clientWidth - xW || 1);
    } else {
      var yH = parseFloat(yThumb.style.height) || 30;
      ts.scrollTop = drag.startScroll + (e.clientY - drag.startPos) *
        (ts.scrollHeight - ts.clientHeight) / (yTrack.clientHeight - yH || 1);
    }
    e.preventDefault();
  }
  function onUp() {
    drag = null;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
  // グローバルにドラッグリスナーを1つだけ登録（重複防止）
  if (window._sbMoveListener) document.removeEventListener('mousemove', window._sbMoveListener);
  if (window._sbUpListener)   document.removeEventListener('mouseup',   window._sbUpListener);
  window._sbMoveListener = onMove;
  window._sbUpListener   = onUp;
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onUp);

  function startDrag(axis, pos, scroll, e) {
    drag = { axis: axis, startPos: pos, startScroll: scroll };
    document.body.style.cursor = 'grabbing';
    document.body.style.userSelect = 'none';
    e.preventDefault();
    e.stopPropagation();
  }
  xThumb.addEventListener('mousedown', function(e) { startDrag('x', e.clientX, ts.scrollLeft, e); });
  yThumb.addEventListener('mousedown', function(e) { startDrag('y', e.clientY, ts.scrollTop,  e); });
  xTrack.addEventListener('mousedown', function(e) {
    if (e.target === xThumb) return;
    var xW = parseFloat(xThumb.style.width) || 30;
    ts.scrollLeft = (e.clientX - xTrack.getBoundingClientRect().left - xW/2) *
      (ts.scrollWidth - ts.clientWidth) / (xTrack.clientWidth - xW || 1);
    e.preventDefault();
  });
  yTrack.addEventListener('mousedown', function(e) {
    if (e.target === yThumb) return;
    var yH = parseFloat(yThumb.style.height) || 30;
    ts.scrollTop = (e.clientY - yTrack.getBoundingClientRect().top - yH/2) *
      (ts.scrollHeight - ts.clientHeight) / (yTrack.clientHeight - yH || 1);
    e.preventDefault();
  });
  if (window._sbScrollListener) ts.removeEventListener('scroll', window._sbScrollListener);
  window._sbScrollListener = updateThumbs;
  ts.addEventListener('scroll', updateThumbs);
  window.addEventListener('resize', updateThumbs);

  updateThumbs();
  window._updateScrollThumbs = updateThumbs;
  window._scrollbarReady = true;
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
/* ═══════════════════════════
   CHART
═══════════════════════════ */
const CHART_METRICS = [
  { k:'spend',  label:'消化金額', color:'#4e79d4' },
  { k:'clicks', label:'クリック', color:'#e07b39' },
  { k:'imp',    label:'IMP',     color:'#59a14f' },
  { k:'cpm',    label:'CPM',     color:'#b07aa1' },
  { k:'cpc',    label:'CPC',     color:'#f28e2b' },
  { k:'ctr',    label:'CTR',     color:'#76b7b2' },
  { k:'cv',     label:'CV',      color:'#d95f02' },
  { k:'cpa',    label:'CPA',     color:'#e15759' },
  { k:'cvr',    label:'CVR',     color:'#8da0cb' },
  { k:'mcv',    label:'MCV',     color:'#a6611a' },
  { k:'mcpa',   label:'MCPA',    color:'#c49a6c' },
  { k:'mcvr',   label:'MCVR',    color:'#66c2a5' },
];
let activeMetrics = new Set(['spend']);
let chartInstance = null;

function initChartButtons() {
  var wrap = document.getElementById('chart-metrics');
  if (!wrap) return;
  wrap.innerHTML = '';
  CHART_METRICS.forEach(function(m) {
    var btn = document.createElement('button');
    btn.className = 'chart-metric-btn' + (activeMetrics.has(m.k) ? ' active' : '');
    btn.textContent = m.label;
    btn.dataset.key = m.k;
    if (activeMetrics.has(m.k)) btn.style.background = m.color;
    btn.onclick = function() {
      if (activeMetrics.has(m.k)) {
        if (activeMetrics.size === 1) return; // 最低1つは選択
        activeMetrics.delete(m.k);
        btn.classList.remove('active');
        btn.style.background = '#fff';
        btn.style.color = '#555';
      } else {
        activeMetrics.add(m.k);
        btn.classList.add('active');
        btn.style.background = m.color;
        btn.style.color = '#fff';
      }
      renderChart();
    };
    wrap.appendChild(btn);
  });
}

function renderChart() {
  var canvas = document.getElementById('chart-canvas');
  if (!canvas) return;
  var rows = mergedCache[curAcc];
  if (!rows) return;

  // 日付フィルタ（renderTableと同じ条件）
  var fromStr = document.getElementById('d-from') ? document.getElementById('d-from').value : '';
  var toStr   = document.getElementById('d-to')   ? document.getElementById('d-to').value   : '';
  var from = fromStr ? parseLocalDate(fromStr, false) : null;
  var to   = toStr   ? parseLocalDate(toStr,   true)  : null;
  var today = new Date(); today.setHours(0,0,0,0);

  var data = rows.filter(function(r) {
    if (r._tot) return false;
    if (!r._d || r._d >= today) return false; // 未来は除外
    if (from && r._d < from) return false;
    if (to   && r._d > to)   return false;
    return true;
  }).sort(function(a,b){ return a._d - b._d; });

  var labels = data.map(function(r) {
    return r._d.getFullYear() + '/' +
      String(r._d.getMonth()+1).padStart(2,'0') + '/' +
      String(r._d.getDate()).padStart(2,'0');
  });

  // 指標ごとに軸を割り当て（%系は右軸）
  var pctKeys = new Set(['ctr','cvr','mcvr']);

  var datasets = [];
  CHART_METRICS.forEach(function(m) {
    if (!activeMetrics.has(m.k)) return;
    var isPct = pctKeys.has(m.k);
    datasets.push({
      label: m.label,
      data: data.map(function(r) {
        var v = r[m.k];
        if (!isFinite(v)) return null;
        if (isPct) return +(v < 1 ? v * 100 : v).toFixed(3);
        return +v;
      }),
      borderColor: m.color,
      backgroundColor: m.color + '22',
      pointRadius: data.length > 60 ? 2 : 4,
      pointHoverRadius: 6,
      borderWidth: 2,
      tension: 0.3,
      yAxisID: isPct ? 'y2' : 'y1',
      spanGaps: false,
    });
  });

  // 軸の使用チェック
  var hasY1 = datasets.some(function(d){ return d.yAxisID === 'y1'; });
  var hasY2 = datasets.some(function(d){ return d.yAxisID === 'y2'; });

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  chartInstance = new Chart(canvas, {
    type: 'line',
    data: { labels: labels, datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 14, padding: 10 } },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              var v = ctx.parsed.y;
              if (v === null || v === undefined) return ctx.dataset.label + ': -';
              var isPct = pctKeys.has(CHART_METRICS.find(function(m){ return m.label === ctx.dataset.label; })?.k || '');
              if (isPct) return ctx.dataset.label + ': ' + v.toFixed(2) + '%';
              return ctx.dataset.label + ': ' + Math.round(v).toLocaleString('ja-JP');
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            font: { size: 10 },
            maxTicksLimit: 15,
            maxRotation: 45,
          },
          grid: { color: '#e8e8e8' }
        },
        y1: {
          display: hasY1,
          position: 'left',
          ticks: { font: { size: 10 }, callback: function(v){ return v.toLocaleString('ja-JP'); } },
          grid: { color: '#e8e8e8' }
        },
        y2: {
          display: hasY2,
          position: 'right',
          ticks: { font: { size: 10 }, callback: function(v){ return v.toFixed(2) + '%'; } },
          grid: { drawOnChartArea: false }
        }
      }
    }
  });
}

function toggleChart() {
  var wrap = document.getElementById('chart-wrap');
  var arrow = document.getElementById('chart-arrow');
  if (wrap.classList.contains('collapsed')) {
    wrap.classList.replace('collapsed', 'expanded');
    arrow.textContent = '▼';
    initChartButtons();
    renderChart();
  } else {
    wrap.classList.replace('expanded', 'collapsed');
    arrow.textContent = '▶';
  }
}

// renderTableが呼ばれるたびにグラフも更新
var _origRenderTable = renderTable;
renderTable = function() {
  _origRenderTable.apply(this, arguments);
  if (document.getElementById('chart-wrap') &&
      document.getElementById('chart-wrap').classList.contains('expanded')) {
    renderChart();
  }
};

/* ═══════════════════════════
   SHARED CONNECT (GAS URLのみで接続)
═══════════════════════════ */
async function doConnectShared() {
  var gasInputEl = document.getElementById('inp-gas');
  var gasInput = (gasInputEl ? gasInputEl.value.trim() : '') || GAS_URL_DEFAULT;
  const errEl = document.getElementById('setup-err');
  errEl.textContent = '';
  if (!gasInput) { errEl.textContent = 'Google Apps Script URLを入力してください'; return; }

  GAS_URL = gasInput;
  localStorage.setItem('meta-ads-gas-url', GAS_URL);

  const btn = document.getElementById('btn-connect-shared');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>接続中…';

  try {
    // GASからcfg取得
    var cloudCfg = await cloudLoadCfg();
    var localCfg2 = loadCfg();

    if (cloudCfg && cloudCfg.sid && cloudCfg.key) {
      // ① GASに設定あり → 常にGASを正として使う（オーナーの最新設定が反映される）
      cfg = cloudCfg;
      saveCfg(); // localStorageにキャッシュ
    } else if (localCfg2 && localCfg2.sid && localCfg2.key) {
      // ② GASが取れない場合のみlocalStorageを使う
      cfg = localCfg2;
    } else {
      // ③ どこにも設定なし → 管理者設定フォームを表示
      errEl.innerHTML = '初回設定が必要です。下の「管理者設定」を開いてAPIキーを入力してください。';
      // 管理者設定を自動的に開く
      var adminSection = document.getElementById('admin-section');
      if (adminSection) adminSection.open = true;
      btn.disabled = false; btn.textContent = '接続する →'; return;
    }
    ssId = cfg.sid;
    apiKey = cfg.key || '';
    saveCfg();

    // スプレッドシートに接続
    const meta = await sheetsApi('?fields=properties.title,sheets.properties(title)');
    srcSheets = (meta.sheets || []).map(function(s){ return s.properties; });
    for (var i = 0; i < srcSheets.length; i++) await fetchPreview(srcSheets[i].title);

    // メモ取得: 両方マージして絶対に消さない
    var cloudMemos = await cloudLoadMemos();
    var localMemos = loadMemos();
    memos = safeMergeMemos(cloudMemos, localMemos);
    saveMemos();
    syncMemosToCloud(memos, cloudMemos);

    // accnote取得: local優先でcloudとマージ
    var cloudAccNotes = await cloudLoadAccNotes();
    var localAccNotes = {};
    Object.keys(localStorage).forEach(function(k) {
      if (k.indexOf('accnote::') === 0) localAccNotes[k.slice(9)] = localStorage.getItem(k);
    });
    // 両方マージして絶対に消さない
    accNotes = Object.assign({}, localAccNotes, cloudAccNotes || {});
    // cloudにないaccnoteをcloudへ同期
    Object.keys(accNotes).forEach(function(aid) { localStorage.setItem('accnote::' + aid, accNotes[aid]); });
    // localにしかないaccnoteをcloudへ同期
    if (cloudAccNotes) {
      Object.keys(localAccNotes).forEach(function(aid) {
        if (!cloudAccNotes[aid] && localAccNotes[aid]) cloudSaveAccNote(aid, localAccNotes[aid]);
      });
    }

    showScreen('screen-dash');
    buildProjTabs();
    if (cfg.projects && cfg.projects.length > 0) selectProj(cfg.projects[0].id);
  } catch(e) {
    errEl.textContent = 'エラー: ' + e.message;
  }
  btn.disabled = false;
  btn.textContent = '接続する →';
}

</script>
